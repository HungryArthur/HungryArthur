<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 435 50'
    style='background-color: #00000000;'
    width='435px' height='50px'>

    <style>
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 600;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d1.end'
                    dur='3500ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h435 ; m0,25 h435 ; m0,25 h0' keyTimes='0;0.68571428571429;0.82857142857143;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#2F81F7ee' font-size='35'
        dominant-baseline='middle'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            👋 Hello! I&#039;m Arthur
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='3500ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h435 ; m0,25 h435 ; m0,25 h0' keyTimes='0;0.68571428571429;0.82857142857143;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#2F81F7ee' font-size='35'
        dominant-baseline='middle'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
